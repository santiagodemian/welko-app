<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#05101F"/>
      <stop offset="100%" stop-color="#0E1F38"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient light orbs -->
  <circle cx="600" cy="200" r="420" fill="#13244A" opacity="0.7" filter="url(#glow)"/>
  <circle cx="200" cy="520" r="200" fill="#1A3A7A" opacity="0.35" filter="url(#glow2)"/>
  <circle cx="1050" cy="80"  r="180" fill="#0D3A7A" opacity="0.30" filter="url(#glow2)"/>

  <!-- Subtle grid -->
  <g stroke="rgba(255,255,255,0.028)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Logo icon centered-left -->
  <rect x="440" y="155" width="80" height="80" rx="20" fill="#13244A" opacity="0.9"/>
  <rect x="440" y="155" width="80" height="80" rx="20" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Three interlocking hexagons -->
  <polygon points="450,195 458,181 474,181 482,195 474,209 458,209"
    stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <polygon points="461,202 469,188 485,188 493,202 485,216 469,216"
    stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <polygon points="472,195 480,181 496,181 504,195 496,209 480,209"
    stroke="white" stroke-width="2.5" fill="none" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="540" y="207" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="62" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Welko</text>

  <!-- Divider -->
  <rect x="440" y="258" width="540" height="1" fill="rgba(255,255,255,0.10)"/>

  <!-- Main tagline -->
  <text x="600" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="38" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-0.5">
    Tu negocio, siempre disponible.
  </text>

  <!-- Sub tagline -->
  <text x="600" y="368" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-size="22" font-weight="300" fill="rgba(240,244,252,0.55)" text-anchor="middle">
    Responde al instante · Agenda automático · Sin esfuerzo · 24/7
  </text>

  <!-- Pill badge -->
  <rect x="486" y="408" width="228" height="36" rx="18"
    fill="rgba(19,36,74,0.7)" stroke="rgba(126,179,255,0.25)" stroke-width="1"/>
  <text x="600" y="431" font-family="system-ui, sans-serif"
    font-size="13" font-weight="600" fill="#7EB3FF" text-anchor="middle" letter-spacing="1.8">
    RECEPCIONISTA IA
  </text>

  <!-- Bottom URL -->
  <text x="600" y="560" font-family="system-ui, sans-serif"
    font-size="16" fill="rgba(240,244,252,0.22)" text-anchor="middle" letter-spacing="0.5">
    welko.agency
  </text>
</svg>
